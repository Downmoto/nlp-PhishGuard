model:
  model_name: "bert-base-uncased"
  num_labels: 2
  max_seq_length: 256

training:
  batch_size: 16
  learning_rate: 2.0e-5
  num_epochs: 3
  warmup_steps: 500
  weight_decay: 0.01
  fp16: true
  # Change to epoch to reduce overhead
  evaluation_strategy: "epoch" 
  save_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "f1"
  save_total_limit: 2
  # Speed up data fetching
  dataloader_num_workers: 4 

data:
  data_dir: "data"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  train_split: 0.70
  val_split: 0.15
  test_split: 0.15
  random_seed: 42
  primary_dataset: "naserabdullahalam/phishing-email-dataset"
  primary_file: "phishing_email.csv"

output:
  output_dir: "models"
  best_checkpoint_dir: "models/best"
  figures_dir: "reports/figures"
  reports_dir: "docs"
